
services:
  app:
    image: ai_detector_v0.1.0
    container_name: ai_detector
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    env_file:
      - local.env
    volumes:
      - ./local.env:/local.env:ro
      - ./certs:/certs:ro        # Mount your certificates (read-only)
      - ./enron_data:/enron_data:ro        # Mount your certificates (read-only)
      - ./ai_emails:/ai_emails:ro        # Mount your certificates (read-only)

    restart: unless-stopped
    environment:
       - RUST_LOG=debug